name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancel in-progress runs of the same workflow on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.33.0'

jobs:
  # ─── Lint + type-check + unit tests ───────────────────────────────
  test:
    name: Lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package (required by api/web typecheck)
        run: pnpm --filter @ona/shared build

      - name: Type-check API
        run: pnpm --filter @ona/api lint

      - name: Type-check Web
        # apps/web has no `lint` script yet; tsc is the gate.
        run: pnpm --filter @ona/web exec tsc --noEmit

      - name: API unit tests
        run: pnpm --filter @ona/api test
        env:
          # Smoke files that hit USDA need the key; if missing, those tests skip.
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}

  # ─── Route smoke tests against a real Postgres + booted API ───────
  # Boots Postgres as a service container, pushes the Drizzle schema,
  # starts the API in the background, registers a throwaway user to
  # mint a token, then runs every `*.smoke.ts` file with that token.
  smoke:
    name: Route smoke (Postgres + API)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 12

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: onatest
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/onatest
      JWT_SECRET: ci-smoke-only-not-used-anywhere-else
      API_PORT: 8765
      API_URL: http://localhost:8765

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @ona/shared build

      - name: Push Drizzle schema to test DB
        run: pnpm --filter @ona/api exec drizzle-kit push --force

      - name: Boot API in background
        run: |
          set -e
          pnpm --filter @ona/api exec tsx src/index.ts > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          for i in $(seq 1 30); do
            if curl -fsS "$API_URL/health" >/dev/null 2>&1; then
              echo "API healthy."
              exit 0
            fi
            sleep 1
          done
          echo "API never responded on /health. Last log:"
          tail -50 /tmp/api.log
          exit 1

      - name: Register smoke user
        id: register
        run: |
          set -e
          TS=$(date +%s)
          REG=$(curl -fsS -X POST "$API_URL/register" \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"smoke_${TS}\",\"email\":\"smoke_${TS}@test.local\",\"password\":\"smokepass123\"}")
          TOKEN=$(printf '%s' "$REG" | node -e 'let b="";process.stdin.on("data",c=>b+=c).on("end",()=>{process.stdout.write(JSON.parse(b).token||"")})')
          UID=$(printf '%s' "$REG" | node -e 'let b="";process.stdin.on("data",c=>b+=c).on("end",()=>{process.stdout.write(JSON.parse(b).user?.id||"")})')
          if [ -z "$TOKEN" ] || [ -z "$UID" ]; then
            echo "Register failed. Response: $REG"
            exit 1
          fi
          # Stash for next step (no values in logs).
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "uid=$UID" >> "$GITHUB_OUTPUT"

      - name: Run smoke vitest suite
        env:
          SMOKE_USER_TOKEN: ${{ steps.register.outputs.token }}
          SMOKE_USER_ID: ${{ steps.register.outputs.uid }}
        run: |
          pnpm --filter @ona/api exec vitest run --reporter=default \
            'src/tests/recipesRoute.smoke.ts' \
            'src/tests/ingredientAutoCreateRoute.smoke.ts' \
            'src/tests/authRoute.smoke.ts' \
            'src/tests/menusRoute.smoke.ts' \
            'src/tests/shoppingRoute.smoke.ts'

      - name: Tail API log on failure
        if: failure()
        run: tail -100 /tmp/api.log || true

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then
            kill "$(cat /tmp/api.pid)" 2>/dev/null || true
          fi

  # ─── End-to-end browser flows (Playwright + booted API + booted Web) ──
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: onatest
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/onatest
      JWT_SECRET: ci-e2e-only-not-used-anywhere-else
      API_PORT: 8765
      API_URL: http://localhost:8765
      WEB_URL: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:8765

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @ona/shared build

      - name: Push Drizzle schema
        run: pnpm --filter @ona/api exec drizzle-kit push --force

      - name: Seed minimal catalog (best-effort)
        run: pnpm --filter @ona/api db:seed || echo 'seed step failed — recipe-catalog spec will skip'
        continue-on-error: true

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package.json') }}

      - name: Install Playwright Chromium
        run: pnpm --filter @ona/web exec playwright install --with-deps chromium

      - name: Boot API
        run: |
          pnpm --filter @ona/api exec tsx src/index.ts > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          for i in $(seq 1 30); do
            if curl -fsS "$API_URL/health" >/dev/null 2>&1; then exit 0; fi
            sleep 1
          done
          tail -50 /tmp/api.log; exit 1

      - name: Boot Web
        run: |
          PORT=3001 pnpm --filter @ona/web exec next dev --port 3001 > /tmp/web.log 2>&1 &
          echo $! > /tmp/web.pid
          for i in $(seq 1 90); do
            if curl -fsS "$WEB_URL/" >/dev/null 2>&1; then exit 0; fi
            sleep 1
          done
          tail -80 /tmp/web.log; exit 1

      - name: Run Playwright
        run: pnpm --filter @ona/web exec playwright test

      - name: Tail logs on failure
        if: failure()
        run: |
          echo '── api.log ─────────────────────────'
          tail -200 /tmp/api.log || true
          echo '── web.log ─────────────────────────'
          tail -200 /tmp/web.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

      - name: Stop processes
        if: always()
        run: |
          for f in /tmp/api.pid /tmp/web.pid; do
            [ -f "$f" ] && kill "$(cat $f)" 2>/dev/null || true
          done

  # ─── Post-deploy smoke against production (master only) ───────────
  # Runs after `test` passes, polls Railway prod URLs until the new
  # build is live, then asserts the basic shape of the deployment.
  post-deploy-smoke:
    name: Production smoke
    runs-on: ubuntu-latest
    needs: [test, smoke, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    timeout-minutes: 10

    env:
      API_URL: https://ona-api-production.up.railway.app
      WEB_URL: https://ona-web-production.up.railway.app

    steps:
      - name: Wait for Railway deploy to settle
        # Railway takes 1–3 minutes to roll out after the push that triggered
        # this workflow. We poll /recipes (returns 401 when the API is alive
        # because the route exists but requires auth) for up to 5 minutes.
        run: |
          set -u
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$API_URL/recipes" || echo 000)
            echo "[poll $i] API /recipes → $code"
            if [ "$code" = "401" ]; then
              echo "API is up."
              exit 0
            fi
            sleep 5
          done
          echo "API never returned 401 after 5 minutes."
          exit 1

      - name: API smoke — auth middleware live
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' "$API_URL/recipes")
          test "$code" = "401" || (echo "Expected 401, got $code" && exit 1)

      - name: API smoke — login route live (rejects bogus credentials)
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "$API_URL/login" \
            -H 'Content-Type: application/json' \
            -d '{"username":"smoke-bogus","password":"smoke-bogus"}')
          # 401 = creds wrong (route alive). 400 = validation error (also alive).
          if [ "$code" != "401" ] && [ "$code" != "400" ]; then
            echo "Expected 401 or 400 from /login, got $code"
            exit 1
          fi

      - name: Web smoke — landing page renders
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' "$WEB_URL/")
          test "$code" = "200" || (echo "Expected 200 from web /, got $code" && exit 1)

      - name: Web smoke — login page renders
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' "$WEB_URL/login")
          test "$code" = "200" || (echo "Expected 200 from web /login, got $code" && exit 1)
