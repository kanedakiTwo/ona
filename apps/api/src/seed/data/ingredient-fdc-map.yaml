# See ingredient-fdc-map.example.yaml for the full format documentation and
# curator workflow. Re-run `pnpm --filter @ona/api seed:usda` after edits.
#
# All fdcIds below were chosen to favour Foundation / SR Legacy entries
# (per-100 g values). They should be re-verified against the live USDA API by
# the curator; if a kcal/macro looks wrong the fix is to change the fdcId, not
# to hand-edit the nutrition columns.

