# Postgres for the smoke-test layer (apps/api/src/tests/*.smoke.ts).
# The dev DB lives wherever you point DATABASE_URL; this one is an isolated
# instance the smoke runner spins up + tears down.
#
# Usage:
#   pnpm --filter @ona/api smoke          # full orchestrator (boot, migrate,
#                                         # register test user, run, teardown)
#   docker compose -f docker-compose.test.yml up -d postgres   # start by hand
#   docker compose -f docker-compose.test.yml down -v          # full reset

services:
  postgres:
    image: postgres:15-alpine
    container_name: ona-test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onatest
    ports:
      # Different from the dev port (5432) so devs can keep dev + smoke side-by-side.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d onatest"]
      interval: 1s
      timeout: 3s
      retries: 30
    tmpfs:
      # Postgres in tmpfs so the test DB starts clean every time.
      - /var/lib/postgresql/data
