[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["echo 'No build step needed - tsx runs TypeScript directly'"]

[start]
cmd = "cd apps/api && npx tsx src/db/migrate.ts && npx tsx src/seed/index.ts && npx tsx src/index.ts"
